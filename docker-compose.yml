services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ip2-streamer
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Puppeteer sandbox must be disabled when running as non-root inside Docker
      PUPPETEER_ARGS: "--no-sandbox,--disable-setuid-sandbox"
    volumes:
      # Persist the SQLite database across restarts
      - sqlite-data:/app/data
    security_opt:
      # Required for Chromium's sandboxing model
      - seccomp:unconfined
    shm_size: "256mb"          # Prevents Chromium renderer crashes
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN              # Needed by Chromium in --no-sandbox mode
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:3000/healthz?token='+process.env.ADMIN_TOKEN, r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

volumes:
  sqlite-data:
